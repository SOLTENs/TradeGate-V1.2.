<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRADE GATE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&display=swap');

  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --border: #1e1e28;
    --text: #e8e8f0;
    --muted: #44445a;
    --accent: #c8ff00;
    --accent-dim: #8aad00;
    --danger: #ff4455;
    --yellow: #ffcc00;
    --green: #00e87a;
    --green-dim: #00994f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow-x: hidden;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 0 32px;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .topbar-logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* PROGRESS */
  .progress-bar {
    height: 2px;
    background: var(--border);
    width: 100%;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* SCREEN */
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 32px 20px 20px;
    animation: fadeUp 0.25s ease both;
    min-height: calc(100vh - 60px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .screen-title {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 36px;
  }

  /* BUTTONS GRID */
  .btn-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.03em;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.15s;
  }

  .option-btn:hover {
    border-color: var(--accent);
    background: #141418;
  }
  .option-btn:hover::before { transform: scaleY(1); }

  .option-btn.selected-green {
    background: rgba(0, 232, 122, 0.12);
    border-color: var(--green);
    color: var(--green);
  }
  .option-btn.selected-green::before {
    background: var(--green);
    transform: scaleY(1);
  }

  .option-btn.selected-yellow {
    background: rgba(255, 204, 0, 0.1);
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .option-btn.selected-yellow::before {
    background: var(--yellow);
    transform: scaleY(1);
  }

  .option-btn.danger-btn {
    color: var(--danger);
    border-color: rgba(255, 68, 85, 0.3);
  }
  .option-btn.danger-btn::before { background: var(--danger); }
  .option-btn.danger-btn:hover { border-color: var(--danger); background: rgba(255,68,85,0.08); }

  /* YES/NO big buttons */
  .yesno-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .yn-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-align: center;
    cursor: pointer;
    transition: all 0.12s;
    text-transform: uppercase;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .yn-btn.yes:hover { border-color: var(--green); color: var(--green); background: rgba(0,232,122,0.08); }
  .yn-btn.no:hover  { border-color: var(--danger); color: var(--danger); background: rgba(255,68,85,0.08); }

  /* NEXT BUTTON */
  .next-btn {
    margin-top: 20px;
    background: var(--accent);
    color: #0a0a0c;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    transition: all 0.12s;
    width: 100%;
  }
  .next-btn:hover { background: #d9ff1a; }
  .next-btn:active { transform: scale(0.98); }

  /* SCREEN 4 special: "semmi" button */
  .semmi-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
  }
  .semmi-btn:hover { border-color: var(--green); color: var(--green); }

  /* SCREEN 6 - dropdowns */
  .setup-container { display: flex; flex-direction: column; gap: 12px; }

  .setup-block {
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .setup-block.open { border-color: var(--accent); }

  .setup-header {
    background: var(--surface);
    padding: 20px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.12s;
  }
  .setup-header:hover { background: #141418; }
  .setup-block.open .setup-header { color: var(--accent); }

  .chevron {
    font-size: 14px;
    transition: transform 0.2s;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .setup-block.open .chevron { transform: rotate(180deg); color: var(--accent); }

  .setup-list {
    display: none;
    flex-direction: column;
    border-top: 1px solid var(--border);
  }
  .setup-block.open .setup-list { display: flex; }

  .setup-item {
    padding: 12px 20px;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    transition: color 0.12s, background 0.12s;
    cursor: default;
  }
  .setup-item:hover { color: var(--green); background: rgba(0, 232, 122, 0.07); }
  .setup-item:last-child { border-bottom: none; }

  /* TRADE ALLOWED */
  .allowed-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
    animation: fadeUp 0.3s ease both;
  }

  .allowed-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 6px 16px;
    margin-bottom: 28px;
    display: inline-block;
  }

  .allowed-title {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(200,255,0,0.35);
    margin-bottom: 12px;
  }

  .allowed-subtitle {
    font-size: 24px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .allowed-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 32px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .allowed-reset:hover { border-color: var(--yellow); color: var(--yellow); }

  .hidden { display: none !important; }

  /* SKIP hint */
  .skip-hint {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    margin-top: 16px;
    text-transform: uppercase;
  }

  /* SKIP button */
  .skip-btn {
    margin-top: 20px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    transition: all 0.12s;
    width: 100%;
  }
  .skip-btn:hover { border-color: var(--green); color: var(--green); background: rgba(0,232,122,0.08); }

  /* divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="topbar-logo">Trade Gate</span>
    <button class="reset-btn" onclick="reset()">Reset</button>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>

  <div id="screens"></div>
</div>

<script>
const SCREENS = [
  {
    id: 1,
    title: "HTF POI",
    type: "single-select",
    options: [
      "k zóna",
      "momentum kiindulási zóna",
      "nyitó zóna",
      "flip zóna",
      "anti-zóna",
      "likviditás söprés",
      "iv",
      "K törés",
      "HTF setup"
    ],
    onSelect: (val) => goTo(2)
  },
  {
    id: 2,
    title: "VAN HELY?",
    type: "yesno",
    onYes: () => goTo(3),
    onNo: () => goTo(1)
  },
  {
    id: 3,
    title: "EXTRA TÁMOGATÓ KÖRÜLMÉNY",
    type: "multi-select",
    options: [
      "csúzli",
      "gyoruslás",
      "P3",
      "kontra setup behalása",
      "1. trendpárna meggyűrés",
      "Polaritás váltás",
      "Choch - kis-k törés - bof",
      "nincs"
    ],
    noneOption: "nincs",
    onNext: () => goTo(4)
  },
  {
    id: 4,
    title: "MI SZÓL A KÖTÉS ELLEN?",
    type: "mixed",
    dangerOptions: [
      "gyorsulás velünk szemben",
      "P3",
      "HTF ZÓNA"
    ],
    yellowOptions: [
      "trenddel szemben",
      "Korrekciók méretének növekedése = ue",
      "Háromszög = ue"
    ],
    noneOption: "semmi",
    onDanger: () => goTo(1),
    onYellow: () => { /* show next, wait */ },
    onNone: () => goTo(5),
    onNext: () => goTo(5)
  },
  {
    id: 5,
    title: "ÉRZELMI KÖTÉS?",
    type: "emotional",
    dangerOptions: [
      "NEHOGY KIMARADJAK!!!",
      "MUSZÁJ NYERNEM!!!",
      "TUDOM MI LESZ!!!"
    ],
    skipOption: "SKIP? OK!",
    onDanger: () => goTo(1),
    onSkip: () => goTo(6)
  
  },
];

let currentScreen = 0;
let screen3Selections = new Set();
let screen4YellowSelected = new Set();
let screen4YellowNext = false;
let s6PrimaryOpen = false;
let s6SecondaryOpen = false;

function goTo(screenNum) {
  currentScreen = screenNum;
  render();
}

function reset() {
  currentScreen = 1;
  screen3Selections = new Set();
  screen4YellowSelected = new Set();
  screen4YellowNext = false;
  s6PrimaryOpen = false;
  s6SecondaryOpen = false;
  render();
}

function updateProgress(step, total) {
  const pct = step === 0 ? 0 : Math.round((step / total) * 100);
  document.getElementById('progress').style.width = pct + '%';
}

function render() {
  const container = document.getElementById('screens');

  if (currentScreen === 0) {
    currentScreen = 1;
  }

  updateProgress(currentScreen - 1, SCREENS.length);

  if (currentScreen > SCREENS.length) {
    // TRADE ALLOWED
    updateProgress(SCREENS.length, SCREENS.length);
    const primaryItems = ["1-2", "W5", "K2k", "DKK", "C", "MOC", "Öreg trendpárna meggyűrődés + BOF", "Korai gyűrődés + Kk + (C1 cross + k)"];
    const secondaryItems = ["RUNNING FLAT", "I-AVGH", "FLAT-C", "NPKP", "NPNP", "Dk", "k2'", "sdiv", "ss+"];
    container.innerHTML = `
      <div class="allowed-screen">
        <div class="allowed-title">TRADE</div>
        <div class="allowed-title" style="color:var(--text)">ALLOWED</div>
        <div class="allowed-subtitle">Mehet a kötés</div>
        <div class="setup-container" style="width:100%;margin-top:32px;text-align:left;">
          <div class="setup-block ${s6PrimaryOpen ? "open" : ""}">
            <div class="setup-header" onclick="toggleSetup('primary')">
              <span>PRIMARY SETUP</span>
              <span class="chevron">&#9660;</span>
            </div>
            <div class="setup-list">
              ${primaryItems.map(i => `<div class="setup-item">${i}</div>`).join("")}
            </div>
          </div>
          <div class="setup-block ${s6SecondaryOpen ? "open" : ""}">
            <div class="setup-header" onclick="toggleSetup('secondary')">
              <span>SECONDARY SETUP</span>
              <span class="chevron">&#9660;</span>
            </div>
            <div class="setup-list">
              ${secondaryItems.map(i => `<div class="setup-item">${i}</div>`).join("")}
            </div>
          </div>
        </div>
        <button class="allowed-reset" style="margin-top:24px;" onclick="reset()">Visszaállítás</button>
      </div>`;
    return;
  }

  const s = SCREENS[currentScreen - 1];
  let html = `<div class="screen">
    <div class="step-label">${currentScreen} / ${SCREENS.length}</div>
    <div class="screen-title">${s.title}</div>`;

  if (s.type === 'single-select') {
    html += `<div class="btn-grid">`;
    s.options.forEach((opt, i) => {
      html += `<button class="option-btn" onclick="screen1Select(${i})">${opt}</button>`;
    });
    html += `</div>`;
  }

  else if (s.type === 'yesno') {
    html += `<div class="yesno-grid">
      <button class="yn-btn yes" onclick="screen2Yes()">igen</button>
      <button class="yn-btn no" onclick="screen2No()">nem</button>
    </div>`;
  }

  else if (s.type === 'multi-select') {
    html += `<div class="btn-grid" id="s3-grid">`;
    s.options.forEach((opt) => {
      const sel = screen3Selections.has(opt);
      const cls = sel ? 'option-btn selected-green' : 'option-btn';
      html += `<button class="${cls}" onclick="screen3Toggle('${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
    });
    html += `</div>`;
    if (screen3Selections.size > 0 && !screen3Selections.has(s.noneOption)) {
      html += `<button class="next-btn" onclick="goTo(4)">Tovább</button>`;
    }
  }

  else if (s.type === 'mixed') {
    html += `<div class="btn-grid" id="s4-grid">`;
    s.dangerOptions.forEach((opt) => {
      html += `<button class="option-btn danger-btn" onclick="screen4Danger()">${opt}</button>`;
    });
    html += `<hr class="divider">`;
    s.yellowOptions.forEach((opt) => {
      const sel = screen4YellowSelected.has(opt);
      const cls = sel ? 'option-btn selected-yellow' : 'option-btn';
      html += `<button class="${cls}" onclick="screen4Yellow('${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
    });
    html += `<hr class="divider">`;
    html += `<button class="semmi-btn" onclick="screen4None()">semmi</button>`;
    html += `</div>`;
    if (screen4YellowNext) {
      html += `<button class="next-btn" onclick="goTo(5)">Tovább</button>`;
    }
  }

  else if (s.type === 'emotional') {
    html += `<div class="btn-grid">`;
    s.dangerOptions.forEach((opt) => {
      html += `<button class="option-btn danger-btn" onclick="screen5Danger()">${opt}</button>`;
    });
    html += `</div>`;
    html += `<button class="skip-btn" onclick="goTo(7)">${s.skipOption}</button>`;
  }

  else if (s.type === 'info') {
    const p = s.primary;
    const sec = s.secondary;

    html += `<div class="setup-container">
      <div class="setup-block ${s6PrimaryOpen ? 'open' : ''}">
        <div class="setup-header" onclick="toggleSetup('primary')">
          <span>${p.label}</span>
          <span class="chevron">&#9660;</span>
        </div>
        <div class="setup-list">
          ${p.items.map(i => `<div class="setup-item">${i}</div>`).join('')}
        </div>
      </div>
      <div class="setup-block ${s6SecondaryOpen ? 'open' : ''}">
        <div class="setup-header" onclick="toggleSetup('secondary')">
          <span>${sec.label}</span>
          <span class="chevron">&#9660;</span>
        </div>
        <div class="setup-list">
          ${sec.items.map(i => `<div class="setup-item">${i}</div>`).join('')}
        </div>
      </div>
    </div>
    <button class="next-btn" style="margin-top:20px;" onclick="goTo(7)">Kötés engedélyezése</button>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

function screen1Select(i) {
  goTo(2);
}

function screen2Yes() { goTo(3); }
function screen2No()  { reset(); }

function screen3Toggle(opt) {
  const s = SCREENS[2];
  if (opt === s.noneOption) {
    screen3Selections = new Set([opt]);
    goTo(4);
    return;
  }
  if (screen3Selections.has(opt)) {
    screen3Selections.delete(opt);
  } else {
    screen3Selections.delete(s.noneOption);
    screen3Selections.add(opt);
  }
  render();
}

function screen4Danger() {
  reset();
}

function screen4Yellow(opt) {
  if (screen4YellowSelected.has(opt)) {
    screen4YellowSelected.delete(opt);
  } else {
    screen4YellowSelected.add(opt);
  }
  screen4YellowNext = screen4YellowSelected.size > 0;
  render();
}

function screen4None() {
  screen4YellowSelected = new Set();
  screen4YellowNext = false;
  goTo(5);
}

function screen5Danger() {
  reset();
}

function toggleSetup(which) {
  if (which === 'primary') s6PrimaryOpen = !s6PrimaryOpen;
  else s6SecondaryOpen = !s6SecondaryOpen;
  render();
}

// Init
reset();
</script>
</body>
</html>
